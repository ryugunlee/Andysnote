                  </div>
                  <textarea
                    id="doc-body"
                    placeholder="Start writing..."
                    data-i18n-placeholder="editor.bodyPlaceholder"
                  ></textarea>
                  <div
                    id="doc-body-rich"
                    contenteditable="true"
                    spellcheck="false"
                    data-placeholder="Start writing..."
                    style="display: none"
                  ></div>
                </div>
              </div>
            </div>
          </div>

          <!-- CALENDAR VIEW -->
          <div class="calendar-view hidden" id="calendar-view">
            <div class="calendar-header" id="calendar-header">
              <div class="cal-filter-group">
                <select
                  class="cal-month-input"
                  id="cal-folder-filter"
                  onchange="calSetFolderFilter(this.value)"
                >
                  <option value="">All folders</option>
                </select>
              </div>
              <div class="cal-nav-group">
                <button class="cal-nav" onclick="calNav(-1)">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="15 18 9 12 15 6" />
                  </svg>
                </button>
                <span class="cal-month-label" id="cal-month-label"></span>
                <button class="cal-nav" onclick="calNav(1)">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="9 18 15 12 9 6" />
                  </svg>
                </button>
              </div>
              <div class="cal-jump-group">
                <input
                  type="month"
                  class="cal-month-input"
                  id="cal-month-jump"
                  onchange="calJumpToMonth(this.value)"
                />
              </div>
            </div>
            <div class="cal-grid" id="cal-grid">
              <div class="cal-weekdays">
                <div class="cal-weekday" data-i18n="cal.weekday.sun">Sun</div>
                <div class="cal-weekday" data-i18n="cal.weekday.mon">Mon</div>
                <div class="cal-weekday" data-i18n="cal.weekday.tue">Tue</div>
                <div class="cal-weekday" data-i18n="cal.weekday.wed">Wed</div>
                <div class="cal-weekday" data-i18n="cal.weekday.thu">Thu</div>
                <div class="cal-weekday" data-i18n="cal.weekday.fri">Fri</div>
                <div class="cal-weekday" data-i18n="cal.weekday.sat">Sat</div>
              </div>
              <div class="cal-days" id="cal-days"></div>
              <div class="cal-stats-buttons">
                <button class="btn" onclick="calShowStatsView('month')" data-i18n="cal.statsMonth">Month summary</button>
                <button class="btn" onclick="calShowStatsView('year')" data-i18n="cal.statsYear">Year summary</button>
              </div>
            </div>
            <div class="cal-day-view hidden" id="cal-day-view">
              <button class="cal-back-btn" onclick="calBackToMonth()">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
                <span data-i18n="cal.backToMonth">Back to month</span>
              </button>
              <h3 class="cal-day-view-title" id="cal-day-view-title"></h3>
              <div class="cal-day-view-body">
                <div class="planner-panel" id="planner-panel"></div>
                <div class="cal-day-view-list" id="cal-day-view-list"></div>
              </div>
            </div>
            <div class="cal-stats-view hidden" id="cal-stats-view">
              <button class="cal-back-btn" onclick="calBackToMonth()">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
                <span data-i18n="cal.backToMonth">Back to month</span>
              </button>
              <h3 class="cal-day-view-title" id="cal-stats-title"></h3>
              <div id="cal-stats-list"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- MODAL -->
    <div
      class="modal-overlay"
      id="modal-overlay"
      onclick="closeModalOutside(event)"
    >
      <div class="modal">
        <h3 id="modal-heading">New Item</h3>
        <select
          id="modal-type"
          onchange="onModalTypeChange(this.value)"
          style="margin-bottom: 12px"
        >
          <option value="doc" data-i18n="modal.typeDoc">Document (.txt)</option>
          <option value="doc-md" data-i18n="modal.typeDocMd">Document (.md)</option>
          <option value="folder" data-i18n="modal.typeFolder">Folder</option>
        </select>
        <input type="text" id="modal-title" placeholder="Name..." />
        <select id="modal-folder">
          <option value="">
            Parent folder (optional — defaults to AndysNote/)
          </option>
        </select>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()" data-i18n="modal.cancel">Cancel</button>
          <button class="btn btn-accent" onclick="createItem()" data-i18n="modal.create">Create</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div
      class="settings-overlay"
      id="settings-overlay"
      onclick="closeSettingsOutside(event)"
    >
      <div class="settings-panel">
        <div class="settings-head">
          <h3 data-i18n="settings.heading">Settings</h3>
          <button class="settings-close" onclick="closeSettings()">✕</button>
        </div>
        <div class="settings-tabs" id="settings-tabs"></div>
        <div class="settings-body" id="settings-body"></div>
      </div>
    </div>

    <script src="js/config.js?v=202607047"></script>
    <script src="js/state.js?v=202607047"></script>
    <script src="js/i18n.js?v=202607047"></script>
    <script src="js/settings.js?v=202607047"></script>
    <script src="js/ui.js?v=202607047"></script>
    <script src="js/cache.js?v=202607047"></script>
    <script src="js/drive.js?v=202607047"></script>
    <script src="js/auth.js?v=202607047"></script>
    <script src="js/sidebar.js?v=202607047"></script>
    <script src="js/markdown.js?v=202607047"></script>
    <script src="js/editor/parser.js?v=202607047"></script>
    <script src="js/editor/renderer.js?v=202607047"></script>
    <script src="js/editor/cursor.js?v=202607047"></script>
    <script src="js/editor/engine.js?v=202607047"></script>
    <script src="js/editor.js?v=202607047"></script>
    <script src="js/local.js?v=202607047"></script>
    <script src="js/sync.js?v=202607047"></script>
    <script src="js/modal.js?v=202607047"></script>
    <script src="js/calendar.js?v=202607047"></script>
    <script src="js/planner.js?v=202607047"></script>
    <script src="js/app.js?v=202607047"></script>

    <!-- Google scripts loaded AFTER app modules so gisLoaded/gapiLoaded are defined when onload fires -->
    <script
      src="https://accounts.google.com/gsi/client"
      async
      defer
      onload="gisLoaded()"
    ></script>
    <script
      src="https://apis.google.com/js/api.js"
      async
      defer
      onload="gapiLoaded()"
    ></script>
  </body>
